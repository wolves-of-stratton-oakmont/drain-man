<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Drain Man">
  <title>Drain Man</title>
  <!-- iron tile so the mark reads in a browser tab -->
  <rect width="48" height="48" rx="10" fill="#1C2B2D"/>
  <!-- pipe-ring -->
  <circle cx="24" cy="25" r="15.5" fill="none" stroke="#1B8F95" stroke-width="3.4"/>
  <circle cx="24" cy="25" r="11.8" fill="#1C2B2D" stroke="#1B8F95" stroke-width="1.3"/>
  <!-- amber depth-tick -->
  <rect x="21.4" y="6.6" width="5.2" height="5.4" rx="0.8" fill="#1C2B2D"/>
  <rect x="22.75" y="7.1" width="2.5" height="4.8" rx="1.25" fill="#E8861E"/>
  <!-- water-drop -->
  <path d="M24 15.4c3.7 4.4 5.8 7.2 5.8 10a5.8 5.8 0 0 1-11.6 0c0-2.8 2.1-5.6 5.8-10Z" fill="#1B8F95"/>
  <path d="M21 25.6a3.1 3.1 0 0 0 2.3 2.8" fill="none" stroke="#1C2B2D" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
